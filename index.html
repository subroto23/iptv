<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>রূপসী বাংলা ক্লাব || একটি সামাজিক উন্নয়নমূলক ক্লাব</title>
    <meta name="description" content="ফریدপুর জেলার বোয়ালমারী উপজেলার কাদিরদী দাসপাড়া গ্রাম সম্পর্কিত তথ্য সমৃদ্ধ সাইট">
    <link rel="icon" href="https://i.ibb.co/Chvqw18/RBC-Logo.jpg" sizes="any">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
    <style>
      :root {
        --bg-main: #0b0f19;
        --bg-card: #151d30;
        --bg-card-hover: #1e2942;
        --primary: #2563eb;
        --primary-glow: rgba(37, 99, 235, 0.4);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --success: #10b981;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* মেইন কন্টেইনার ফিক্স */
      .app-container {
        display: flex;
        flex: 1;
        overflow: hidden;
        flex-direction: column;
        height: 100%;
      }

      @media (min-width: 1024px) {
        .app-container {
          flex-direction: row;
        }
      }

      /* ভিডিও প্লেয়ার সেকশন */
      .player-section {
        background: #000;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        aspect-ratio: 16 / 9;
        flex-shrink: 0;
      }

      @media (min-width: 1024px) {
        .player-section {
          flex: 1.4;
          height: 100%;
          aspect-ratio: auto;
        }
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .error-overlay {
        position: absolute;
        background: rgba(11, 15, 25, 0.95);
        inset: 0;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        color: var(--danger);
        font-size: 15px;
        font-weight: 600;
        z-index: 10;
      }

      /* চ্যানেল এরিয়া ও স্ক্রোল ফিক্স */
      .content-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #0e1424;
        overflow: hidden; 
        border-left: 1px solid #1e293b;
        height: 100%;
      }

      .controls-wrapper {
        padding: 16px;
        background: #0b0f19;
        border-bottom: 1px solid #1e293b;
        display: flex;
        flex-direction: column;
        gap: 10px;
        flex-shrink: 0;
      }

      .search-box input {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg-card);
        border: 1px solid #23314f;
        border-radius: 12px;
        color: var(--text-main);
        font-size: 14px;
        outline: none;
        transition: all 0.3s ease;
      }

      .search-box input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-glow);
      }

      #status-bar {
        background: rgba(30, 41, 59, 0.4);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-muted);
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      /* আল্ট্রা-রেসপনসিভ গ্রিড (স্ক্রোল ও কার্ড হাইট ফিক্সড) */
      .channel-grid-container {
        flex: 1;
        overflow-y: auto; 
        padding: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 14px;
        align-content: start;
      }

      @media (min-width: 480px) {
        .channel-grid-container {
          grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
          gap: 16px;
        }
      }

      .channel-grid-container::-webkit-scrollbar {
        width: 6px;
      }
      .channel-grid-container::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 4px;
      }

      /* ওটিটি প্রিমিয়াম ফ্ল্যাট কার্ড ডিজাইন */
      .channel-card {
        background: var(--bg-card);
        border-radius: 12px;
        padding: 14px 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.25s ease;
        border: 1px solid rgba(255, 255, 255, 0.03);
        position: relative;
        min-height: 145px; 
        height: 145px; /* ফিক্সড হাইট যেন কেটে না যায় */
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .channel-card:hover {
        background: var(--bg-card-hover);
        transform: translateY(-4px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        border-color: #3b82f6;
      }

      .channel-card.active {
        background: rgba(37, 99, 235, 0.15);
        border-color: var(--primary);
        box-shadow: 0 0 12px var(--primary-glow);
      }

      /* থাম্বনেইল/লোগো সাইজ ফিক্স */
      .logo-wrapper {
        width: 68px;
        height: 68px;
        background: #ffffff;
        border-radius: 12px;
        padding: 6px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 12px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        flex-shrink: 0;
      }

      .channel-logo {
        width: 100%;
        height: 100%;
        object-fit: contain; 
      }

      /* চ্যানেলের নাম ক্লিপিং ফিক্স */
      .channel-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
        line-height: 1.3;
        text-align: center;
        word-break: break-word;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        width: 100%;
        height: 34px; /* নির্দিষ্ট লাইনের স্পেসিং */
      }

      .live-badge {
        position: absolute;
        top: 6px;
        right: 6px;
        background: var(--success);
        color: #fff;
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 8px;
        font-weight: 700;
        text-transform: uppercase;
        display: none;
      }

      .channel-card.active .live-badge {
        display: block;
      }

      .spinner {
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top: 2px solid var(--primary);
        border-radius: 50%;
        width: 14px;
        height: 14px;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>

    <div class="app-container">
      <div class="player-section">
        <video id="video-player" controls playsinline></video>
        <div class="error-overlay" id="error-layer">
          <p>চ্যানেলটি সাময়িকভাবে ডাউন আছে তাই প্লে করা যাচ্ছে না।</p>
        </div>
      </div>

      <div class="content-section">
        <div class="controls-wrapper">
          <div class="search-box">
            <input type="text" id="search-input" placeholder="চ্যানেল খুঁজুন..." />
          </div>
          <div id="status-bar">
            <div class="spinner" id="status-spinner"></div>
            <span id="status-text">প্লেলিস্ট প্রসেস করা হচ্ছে...</span>
          </div>
        </div>
        <div class="channel-grid-container" id="channel-grid"></div>
      </div>
    </div>

    <script>
      const playlistUrl = "https://raw.githubusercontent.com/imShakil/tvlink/refs/heads/main/iptv.m3u8";
      const video = document.getElementById("video-player");
      const errorLayer = document.getElementById("error-layer");
      const statusText = document.getElementById("status-text");
      const statusSpinner = document.getElementById("status-spinner");
      const gridContainer = document.getElementById("channel-grid");
      const searchInput = document.getElementById("search-input");

      let hls;
      let activeCard = null;
      let validChannelCount = 0;
      let searchQuery = "";
      let checkerHls = null;

      searchInput.addEventListener("input", (e) => {
        searchQuery = e.target.value.toLowerCase().trim();
        filterChannels();
      });

      async function fetchPlaylist() {
        try {
          const response = await fetch(playlistUrl);
          if (!response.ok) throw new Error();
          const data = await response.text();
          parseAndValidateM3u(data);
        } catch (error) {
          statusSpinner.style.display = "none";
          statusText.innerHTML = "❌ প্লেলিস্ট লোড করতে ব্যর্থ।";
        }
      }

      function parseAndValidateM3u(content) {
        const lines = content.split("\n");
        const rawChannels = [];
        let currentName = "Unknown Channel";
        let currentLogo = "";

        lines.forEach((line) => {
          line = line.trim();
          if (line.startsWith("#EXTINF:")) {
            const logoMatch = line.match(/tvg-logo="(.*?)"/);
            currentLogo = logoMatch ? logoMatch[1] : "";
            const nameSplit = line.split(",");
            if (nameSplit.length > 1) currentName = nameSplit[nameSplit.length - 1].trim();
          } else if (line.length > 0 && !line.startsWith("#")) {
            let secureUrl = line;
            if (line.startsWith("http://")) {
                secureUrl = line.replace("http://", "https://");
            }
            rawChannels.push({ name: currentName, logo: currentLogo, url: secureUrl, originalUrl: line });
            currentName = "Unknown Channel";
            currentLogo = "";
          }
        });

        if (rawChannels.length === 0) {
          statusSpinner.style.display = "none";
          statusText.innerText = "কোনো চ্যানেল পাওয়া যায়নি।";
          return;
        }

        validateSequential(rawChannels);
      }

      async function validateSequential(channels) {
        statusText.innerText = `চ্যানেল যাচাই করা হচ্ছে... (সচল: ০)`;
        
        for (let i = 0; i < channels.length; i++) {
          const chan = channels[i];
          statusText.innerText = `স্ক্যানিং: ${i + 1}/${channels.length} | সচল: ${validChannelCount}`;
          
          let isValid = await checkHlsLink(chan.url);
          if (!isValid && chan.url !== chan.originalUrl) {
            isValid = await checkHlsLink(chan.originalUrl);
            if(isValid) chan.url = chan.originalUrl;
          }

          // সচল হলে সাথে সাথে UI-তে যুক্ত হবে, অন্যথায় অবজেক্টটি বাদ যাবে
          if (isValid) {
            appendChannelToUI(chan);
          }
        }

        statusSpinner.style.display = "none";
        statusText.innerText = `যাচাইকরণ শেষ! মোট সচল চ্যানেল: ${validChannelCount}টি`;
      }

      function checkHlsLink(url) {
        return new Promise((resolve) => {
          if (!Hls.isSupported()) {
            // Hls.js নেটিভলি সাপোর্ট না করলে (যেমন iOS Safari) Network Fetch দিয়ে রেসপন্স হেডার চেক করবে
            fetch(url, { method: 'HEAD', mode: 'no-cors' })
              .then(() => resolve(true))
              .catch(() => resolve(false));
            return;
          }

          if (checkerHls) checkerHls.destroy();
          
          checkerHls = new Hls({
            manifestLoadingTimeOut: 1500, // টাইমআউট ১.৫ সেকেন্ডে নামানো হয়েছে ফাস্ট চেকিংয়ের জন্য
            manifestLoadingMaxRetry: 0,
            fragLoadingMaxRetry: 0
          });

          checkerHls.loadSource(url);
          
          checkerHls.on(Hls.Events.MANIFEST_PARSED, () => {
            checkerHls.destroy();
            resolve(true);
          });

          checkerHls.on(Hls.Events.ERROR, (event, data) => {
            checkerHls.destroy();
            resolve(false);
          });
        });
      }

      function appendChannelToUI(channel) {
        const fallbackSVG = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjOTRhM2I4IiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHJlY3QgeD0iMiIgeT0iNyIgd2lkdGg9IjIwIiBoZWlnaHQ9IjE1IiByeD0iMiIgcnk9IjIiPjwvcmVjdD48cG9seWxpbmUgcG9pbnRzPSIxNyAyIDEyIDcgNyAyIj48L3BvbHlsaW5lPjwvc3ZnPg==";

        const card = document.createElement("div");
        card.className = "channel-card";
        card.innerHTML = `
          <div class="live-badge">Live</div>
          <div class="logo-wrapper">
            <img src="${channel.logo || fallbackSVG}" class="channel-logo" onerror="this.src='${fallbackSVG}'" alt="TV">
          </div>
          <div class="channel-name">${channel.name}</div>
        `;

        card.onclick = () => {
          if (activeCard) activeCard.classList.remove("active");
          card.classList.add("active");
          activeCard = card;

          playChannel(channel.url);

          if (window.innerWidth < 1024) {
            window.scrollTo({ top: 0, behavior: "smooth" });
          }
        };

        if (searchQuery !== "" && !channel.name.toLowerCase().includes(searchQuery)) {
          card.style.display = "none";
        }

        gridContainer.appendChild(card);

        if (validChannelCount === 0) {
          card.click();
        }

        validChannelCount++;
      }

      function filterChannels() {
        const cards = gridContainer.querySelectorAll(".channel-card");
        cards.forEach((card) => {
          const name = card.querySelector(".channel-name").innerText.toLowerCase();
          card.style.display = name.includes(searchQuery) ? "flex" : "none";
        });
      }

      function playChannel(url) {
        errorLayer.style.display = "none";

        if (Hls.isSupported()) {
          if (hls) hls.destroy();
          
          hls = new Hls({
            maxBufferLength: 15,
            enableWorker: true,
            lowLatencyMode: true
          });

          hls.loadSource(url);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => console.log("Autoplay blocked"));
          });

          hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
              errorLayer.style.display = "flex";
            }
          });
        } 
        else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = url;
          video.addEventListener("loadedmetadata", () => {
            video.play().catch(() => console.log("Autoplay blocked"));
          });
          video.addEventListener("error", () => {
            errorLayer.style.display = "flex";
          });
        }
      }

      fetchPlaylist();
    </script>
  </body>
</html>
